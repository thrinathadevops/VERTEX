server {
    listen 80;
    server_name _;

    # Allow resume uploads up to 10MB and longer timeouts for AI processing
    client_max_body_size 10m;

    location /api/ {
        proxy_pass http://ai_interview_backend:8010/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }

    location /health {
        proxy_pass http://ai_interview_backend:8010/health;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://ai_interview_frontend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
